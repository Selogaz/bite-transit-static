
<section class="map section" id="map">
  <div class="map__container section__container container">
    <div class="section__head">
      <h2 class="section-title">Терминалы на карте</h2>
    </div>

    <div class="map__media media">
      <picture class="media__pic">
        <img class="media__img" src="@img/map.bit/map-terminals@2x.jpg" alt="Карта терминалов «Байт Транзит»" loading="lazy">
      </picture>

      <ul class="map__pins">
        <li class="map__pin map__pin--1"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--2"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--3"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--4"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--5"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--6"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
        <li class="map__pin map__pin--7"><img class="map__pin-icon" src="@img/map.bit/icon-pin.svg" alt="" loading="lazy"></li>
      </ul>
    </div>
  </div>
</section>
