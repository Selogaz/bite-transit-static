
<section class="thanks-hero" id="thanks-hero">
  <div class="thanks-hero__container container">
    <div class="thanks-hero__content">
      <p class="thanks-hero__badge">
        <svg class="thanks-hero__badge-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22ZM13 7H11V13H17V11H13V7Z" fill="currentColor"/>
        </svg>
        Режим работы: 09-18 МСК
      </p>

      <h1 class="thanks-hero__title">
        У менеджера уже загорелись глаза.
        <br>
        <span class="thanks-hero__title-mark">Спасибо за заявку!</span>
      </h1>

      <p class="thanks-hero__subtitle">Не забудьте скачать свой подарок. Менеджер также продублирует его в переписке</p>

      <a class="thanks-hero__download" href="#">
        <span class="thanks-hero__download-media media">
          <picture class="media__pic">
            <img class="media__img" src="@img/thanks.bit/@@downloadImage" alt="" loading="lazy">
          </picture>
        </span>
        <span class="thanks-hero__download-text">@@downloadPrefix <b>«@@downloadTitle»</b></span>
      </a>
    </div>
  </div>

  <div class="thanks-hero__media media">
    <picture class="media__pic">
      <img class="media__img" src="@img/thanks.bit/manager-warehouse@2x.jpg" alt="Менеджер на складе с грузовиками и товаром" loading="lazy">
    </picture>
  </div>
</section>
