
<section class="course" id="course">
  <div class="course__container container">
    <span class="course__glow" aria-hidden="true"></span>

    <div class="course__card">
      <div class="course__text">
        <h2 class="course__title"><span class="course__title-thin">Получите</span><br>бесплатный курс по официальному ВЭД</h2>

        <p class="course__desc">
          25 уроков о том, как перейти на официальный ввоз товаров из Китая.
          Узнайте, как исключить убытки из-за ошибок или поймите, как
          <b>увеличить маржинальность</b> текущей схемы
        </p>
      </div>

      <div class="course__offer">
        <div class="course__offer-top">
          <div class="course__media media">
            <picture class="media__pic">
              <img class="media__img" src="@img/course.bit/course-book@2x.jpg" alt="Курс по официальному ВЭД" width="290" height="212" loading="lazy">
            </picture>
          </div>

          <div class="course__timer timer timer--lg" data-timer data-timer-deadline="">
            <span class="timer__unit">
              <span class="timer__num" data-timer-minutes>00</span>
              <span class="timer__label">минут</span>
            </span>
            <span class="timer__unit">
              <span class="timer__num" data-timer-seconds>00</span>
              <span class="timer__label">секунды</span>
            </span>
          </div>
        </div>

        <div class="course__offer-bottom">
          <p class="course__price">
            <span class="course__price-old">16 990₽</span>
            <span class="course__price-new">0₽</span>
          </p>

          <button class="course__cta button button--primary" type="button" data-b_modal-open="callback" data-form-name="Курс — забрать бесплатно">
            Забрать курс <b>бесплатно</b>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
