<li class="benefit-card@@modifier swiper-slide" aria-hidden="@@ariaHidden" tabindex="@@tabindex">
  <h3 class="benefit-card__title">@@title</h3>

  <div class="benefit-card__media media">
    <picture class="media__pic">
      <img class="media__img" src="@img/benefits.bit/@@image" alt="@@imageAlt" width="305" height="211" loading="lazy">
    </picture>
  </div>

  <div class="benefit-card__panels">
    <div class="benefit-card__panel">
      <p class="benefit-card__panel-title">Прямая экономия:</p>
      <ul class="benefit-card__panel-list">
        @@economyList
      </ul>
    </div>

    <div class="benefit-card__panel benefit-card__panel--accent">
      <p class="benefit-card__panel-title">Бесценные выгоды:</p>
      <ul class="benefit-card__panel-list">
        @@benefitsList
      </ul>
    </div>
  </div>
</li>
