<div class="course__offer-bottom course-offer">
  <button class="course__cta button button--primary" type="button" data-b_modal-open="callback" data-form-name="@@formName">
    Забрать курс <b>бесплатно</b>
  </button>

  <p class="course__price">
    <span class="course__price-old">16 990₽</span>
    <span class="course__price-new">0₽</span>
  </p>

  <div class="timer timer--lg" data-timer data-timer-deadline="">
    <span class="timer__unit">
      <span class="timer__num" data-timer-minutes>00</span>
      <span class="timer__label">минут</span>
    </span>
    <span class="timer__unit">
      <span class="timer__num" data-timer-seconds>00</span>
      <span class="timer__label">секунды</span>
    </span>
  </div>
</div>
