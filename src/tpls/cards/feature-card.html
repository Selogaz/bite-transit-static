<li class="feature-card feature-card--@@modifier swiper-slide">
  <h3 class="feature-card__title">@@title</h3>

  <ul class="feature-card__list">
    @@list
  </ul>

  <div class="feature-card__media media@@if (typeof fade != 'undefined') { feature-card__media--fade}">
    <picture class="media__pic">
      <img class="media__img" src="@img/features.bit/@@image" alt="" width="@@imgWidth" height="@@imgHeight" loading="lazy">
    </picture>
  </div>
</li>
