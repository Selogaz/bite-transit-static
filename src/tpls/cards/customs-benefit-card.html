<li class="customs-benefit-card@@modifier swiper-slide" aria-hidden="@@ariaHidden" tabindex="@@tabindex">
  <div class="customs-benefit-card__body">
    <h3 class="customs-benefit-card__title">@@title</h3>
    <p class="customs-benefit-card__desc">@@desc</p>
  </div>

  <div class="customs-benefit-card__media media">
    <picture class="media__pic">
      <source media="(max-width: 991px)" srcset="@img/customs-benefits.bit/@@imageMobile">
      <img class="media__img" src="@img/customs-benefits.bit/@@image" alt="@@imageAlt" width="344" height="528" loading="lazy">
    </picture>
  </div>
</li>
