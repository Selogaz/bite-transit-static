<li class="audit-point">
  <div class="audit-point__media media">
    <picture class="media__pic">
      <img class="media__img" src="@img/audit.bit/@@image" alt="" width="78" height="96" loading="lazy">
    </picture>
  </div>
  <div class="audit-point__body">
    <p class="audit-point__title">@@title</p>
    <p class="audit-point__text">@@text</p>
  </div>
</li>
