
<div class="hero-stage-card @@className">
  <span class="hero-stage-card__backdrop" aria-hidden="true"></span>
  <div class="hero-stage-card__media media">
    <picture class="media__pic">
      <img class="media__img" src="@@photo" alt="" width="149" height="85" loading="lazy">
    </picture>
  </div>
  <p class="hero-stage-card__caption">
    <span class="hero-stage-card__num">@@num</span>
    <span class="hero-stage-card__label">@@label</span>
  </p>
</div>
