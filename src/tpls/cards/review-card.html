<li class="review-card swiper-slide">
  <div class="review-card__header">
    <div class="review-card__avatar media media--cover">
      <picture class="media__pic">
        <img class="media__img" src="@img/reviews.bit/@@avatar" alt="@@name" loading="lazy">
      </picture>
    </div>
    <div class="review-card__author">
      <p class="review-card__name">@@name</p>
      <p class="review-card__quote">@@quote</p>
    </div>
  </div>

  <p class="review-card__text">@@text</p>
</li>
