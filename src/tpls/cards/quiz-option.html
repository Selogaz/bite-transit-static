<li class="quiz-option@@modifier">
  <label class="quiz-option__label">
    <input type="radio" name="@@name" class="quiz-option__input" @@checked>
    <span class="quiz-option__radio"></span>
    <span class="quiz-option__text">@@text</span>
    <div class="quiz-option__media media">
      <picture class="media__pic">
        <img class="media__img" src="@img/quiz.bit/@@image" alt="" width="97" height="98" loading="lazy">
      </picture>
    </div>
  </label>
</li>
