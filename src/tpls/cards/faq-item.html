<div class="faq-item bayan">
  <div class="faq-item__question">
    <span class="faq-item__question-text">@@question</span>
    <span class="faq-item__icon">
      <svg class="faq-item__icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line class="faq-item__icon-bar faq-item__icon-bar--vertical" x1="12" y1="5" x2="12" y2="19"></line>
        <line class="faq-item__icon-bar" x1="5" y1="12" x2="19" y2="12"></line>

  <div class="faq-item__answer">
    <div class="faq-item__answer-inner">@@answer</div>
  </div>
</div>
