<li class="partner-card partner-card--@@modifier swiper-slide">
  <div class="partner-card__media media media--@@fit">
    <picture class="media__pic partner-card__mono">
      <source media="(max-width: 991px)" srcset="@img/partners.bit/@@imageColor">
      <img class="media__img" src="@img/partners.bit/@@image" alt="@@name" loading="lazy">
    </picture>
    <picture class="media__pic partner-card__color" aria-hidden="true">
      <img class="media__img" src="@img/partners.bit/@@imageColor" alt="" loading="lazy">
    </picture>
  </div>
</li>
