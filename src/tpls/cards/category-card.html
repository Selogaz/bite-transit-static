<li class="category-card">
  <div class="category-card__media media">
    <picture class="media__pic">
      <img class="media__img" src="@img/categories.bit/@@image" alt="" width="174" height="252" loading="lazy">
    </picture>
  </div>

  <div class="category-card__body">
    <h3 class="category-card__title">@@title</h3>
    <p class="category-card__text">@@text</p>
  </div>
</li>
