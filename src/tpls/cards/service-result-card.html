<li class="service-result-card@@if (typeof slide != 'undefined') { swiper-slide}">
  <div class="service-result-card__media media">
    <picture class="media__pic">
      <img class="media__img" src="@img/services.bit/card-service@2x.jpg" alt="@@alt" width="466" height="267" loading="lazy">
    </picture>
  </div>
  <p class="service-result-card__stat">Сэкономили: @@percent / поставка</p>
  <p class="service-result-card__company">@@company</p>
  <ul class="service-result-card__tags">
    <li class="service-result-card__tag">@@tag1</li>
    <li class="service-result-card__tag">@@tag2</li>
  </ul>
  <button class="service-result-card__more button button--secondary" type="button" data-b_modal-open="case-detail">Читать полностью</button>
</li>
